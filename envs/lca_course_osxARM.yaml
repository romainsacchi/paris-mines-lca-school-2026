# in your terminal, run: conda env create -f lca_course_osxARM.yaml

name: lca-course
channels:
  - conda-forge
  - cmutel
  - lca
  - romainsacchi
dependencies:
  - python=3.11
  - bw2calc>=2.0.1
  - bw2data>=4.3
  - bw2io>=0.9.4
  - bw2analyzer
  - bw2parameters
  - bw_processing
  - stats_arrays
  - numpy<2.0.0
  - pandas<3.0.0
  - scipy<1.14.0
  - sparse>=0.14.0,<0.18
  - bottleneck
  - jupyterlab
  - openpyxl
  - matplotlib
  - plotly
  - networkx
  - seaborn
  - prettytable
  - constructive-geometries>=1.0.0
  - country_converter
  - ecoinvent_interface
  - cryptography
  - datapackage
  - platformdirs
  - pyarrow
  - pycountry
  - python-dotenv
  - pyyaml
  - requests
  - schema
  - xarray<=2024.2.0
  - tqdm
  - fair
  - pyvis
  - pyside6<6.10
  - scikit-umfpack
  - pip<26
  - setuptools<81
  - pip:
      - git+https://github.com/romainsacchi/edges.git
      - git+https://github.com/polca/premise.git
      - git+https://github.com/Laboratory-for-Energy-Systems-Analysis/trails.git
      - multifunctional
      - bw_simapro_csv
      - git+https://github.com/romainsacchi/d3blocks.git
      - polyviz
      - activity-browser
