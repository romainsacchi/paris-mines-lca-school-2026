# in your terminal, run conda: conda env create -f bw_env_osxARM.yaml

name: bw
channels:
  - conda-forge
  - cmutel
  - lca
  - romainsacchi
dependencies:
  - python>=3.10,<3.13
  - bw2calc
  - bw2data
  - bw2io
  - bw2analyzer
  - bw2parameters
  - bw_processing
  - stats_arrays
  - scipy
  - scikit-umfpack
  - jupyterlab
  - numpy==1.24.4
  - pandas
  - openpyxl
  - matplotlib
  - plotly
  - networkx
  - seaborn
  - prettytable
  - constructive_geometries
  - country_converter
  - pyside6<6.10
  - pip<26
  - setuptools<81
  - pip:
      - git+https://github.com/romainsacchi/edges.git
      - multifunctional
      - bw_simapro_csv
      - git+https://github.com/romainsacchi/d3blocks.git
      - polyviz
      - activity-browser
